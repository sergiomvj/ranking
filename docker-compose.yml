version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: ranking_agentes_db
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
      POSTGRES_DB: ranking_hub
    ports:
      - '5436:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
